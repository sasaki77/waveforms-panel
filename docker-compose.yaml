services:
  grafana:
    extends:
      file: .config/docker-compose-base.yaml
      service: grafana
    build:
      args:
        grafana_image: ${GRAFANA_IMAGE:-grafana}
        grafana_version: ${GRAFANA_VERSION:-12.1.0}
    volumes:
      - grafana-waveforms-storage:/var/lib/grafana
    environment:
      GF_PLUGINS_PREINSTALL: custom-plugin@@https://github.com/sasaki77/archiverappliance-datasource/releases/latest/download/archiverappliance-datasource.zip
      GF_PLUGINS_ALLOW_LOADING_UNSIGNED_PLUGINS: 'sasaki77-waveforms-panel, sasaki77-archiverappliance-datasource'
volumes:
  grafana-waveforms-storage:
